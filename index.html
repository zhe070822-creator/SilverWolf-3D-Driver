<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Silver Wolf - Skeleton Driver</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #f5f5f5; color: #333; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
    #viewer { width: 100vw; height: 100vh; position: relative; }
    #viewer canvas { display: block; }
    #info { position: absolute; top: 8px; left: 8px; background: rgba(255,255,255,0.85); padding: 6px 10px; border-radius: 4px; font-size: 12px; color: #555; z-index: 10; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
    #resetCamBtn { position: absolute; top: 38px; left: 8px; cursor: pointer; border: none; background: rgba(255,255,255,0.85); color: #555; font-size: 12px; padding: 4px 10px; border-radius: 3px; z-index: 10; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
    #resetCamBtn:hover { background: #fff; color: #333; }
    #toggleBtn { position: absolute; top: 8px; right: 8px; z-index: 30; background: #e94560; color: #fff; border: none; padding: 4px 10px; border-radius: 3px; cursor: pointer; font-size: 14px; box-shadow: 0 1px 4px rgba(0,0,0,0.15); }
    #panel {
      position: absolute; top: 0; right: -320px; width: 320px; height: 100vh;
      background: #fff; overflow-y: auto; padding: 12px;
      border-left: 3px solid #e94560; user-select: none; z-index: 20;
    }
    #panel.visible { right: 0; }
    #panel h2 { font-size: 16px; margin: 8px 0 4px; color: #e94560; }
    #panel h3 { font-size: 13px; margin: 6px 0 2px; color: #d35400; cursor: pointer; }
    #panel h3:hover { color: #e67e22; }
    .bone-group { margin-left: 8px; }
    .bone-row { display: flex; align-items: center; margin: 3px 0; font-size: 12px; }
    .bone-row label { width: 65px; flex-shrink: 0; color: #444; }
    .bone-row input[type="range"] { flex: 1; margin: 0 4px; accent-color: #e94560; }
    .bone-row .axis { width: 14px; text-align: center; color: #888; font-size: 11px; flex-shrink: 0; }
    .bone-row .val { width: 32px; text-align: right; color: #555; font-size: 11px; flex-shrink: 0; }
    button { background: #e94560; color: #fff; border: none; padding: 4px 10px; border-radius: 3px; cursor: pointer; font-size: 11px; margin: 2px; }
    button:hover { background: #c0392b; }
    button.reset { background: #7f8c8d; }
    button.reset:hover { background: #636e72; }
  </style>
</head>
<body>
  <div id="viewer">
    <div id="info">加载中...</div>
    <button id="resetCamBtn" style="display:none;">归位</button>
    <button id="toggleBtn" style="display:none;">☰</button>
    <button id="flyBtn" style="display:none;position:absolute;top:66px;left:8px;z-index:30;background:#2980b9;color:#fff;border:none;padding:4px 10px;border-radius:3px;cursor:pointer;font-size:12px;">飞行模式</button>
    <div id="flySpeed" style="display:none;position:absolute;top:100px;left:8px;z-index:30;background:rgba(0,0,0,0.5);color:#fff;padding:3px 6px;border-radius:3px;font-size:10px;user-select:none;">
      速度 <span id="flySpeedVal">1.0</span>x<br>
      <input type="range" id="flySpeedSlider" min="0.1" max="20" step="0.1" value="1" style="width:60px;accent-color:#2980b9;">
    </div>
    <button id="animBtn" style="display:none;position:absolute;top:140px;left:8px;z-index:30;background:#27ae60;color:#fff;border:none;padding:4px 10px;border-radius:3px;cursor:pointer;font-size:12px;">播放动画</button>
  </div>
  <div id="panel"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
